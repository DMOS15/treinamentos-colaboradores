 class="colab-card" data-nome="leticia silva" data-area="manutenção adm" data-coordenador="eliezer silva"><h3>LETICIA SILVA</h3><p><strong>Área:</strong> MANUTENÇÃO ADM</p><p><strong>Coordenador:</strong> ELIEZER SILVA</p><a class="btn-ver" href="colaboradores/71_LETICIA_SILVA.html">Ver treinamentos</a></div><div class="colab-card" data-nome="raissa oliveira" data-area="qualidade" data-coordenador="angelina bertolla biudes destefani"><h3>RAISSA OLIVEIRA</h3><p><strong>Área:</strong> QUALIDADE</p><p><strong>Coordenador:</strong> ANGELINA DESTEFANI</p><a class="btn-ver" href="colaboradores/95_RAISSA_OLIVEIRA.html">Ver treinamentos</a></div>`;

  function limparHtml(html) {
    if (!html) return '';

    return html
      .replace(/{"value":\s*""}/g, '')
      .replace(/""/g, '')
      .replace(/,,/g, ',')
      .trim();
  }

  const htmlFinal = limparHtml(rawHtml);

  // ✅ Só renderiza se for conteúdo válido
  if (htmlFinal && htmlFinal !== '""') {
    document.getElementById('cardsColaboradores').innerHTML = htmlFinal;
  }

  // =============================
  // FILTROS (SEM ALTERAÇÃO)
  // =============================

  const nomeInput = document.getElementById('filtroNome');
  const areaSelect = document.getElementById('selectArea');
  const coordSelect = document.getElementById('selectCoord');

  function atualizarFiltros() {
    const cards = document.querySelectorAll('.colab-card');
    const areas = new Set();
    const coords = new Set();

    cards.forEach(card => {
      if (card.dataset.area) areas.add(card.dataset.area);
      if (card.dataset.coordenador) coords.add(card.dataset.coordenador);
    });

    const areaAtual = areaSelect.value;
    const coordAtual = coordSelect.value;

    areaSelect.innerHTML = '<option value="">📁 Todas as áreas</option>';
    coordSelect.innerHTML = '<option value="">👔 Todos os coordenadores</option>';

    [...areas].sort().forEach(area => {
      areaSelect.innerHTML += `<option value="${area}">${area}</option>`;
    });

    [...coords].sort().forEach(coord => {
      coordSelect.innerHTML += `<option value="${coord}">${coord}</option>`;
    });

    areaSelect.value = areaAtual;
    coordSelect.value = coordAtual;
  }

  function filtrar() {
    const nome = nomeInput.value.toLowerCase();
    const area = areaSelect.value;
    const coord = coordSelect.value;
    const cards = document.querySelectorAll('.colab-card');

    cards.forEach(card => {
      const matchNome = nome === '' || (card.dataset.nome && card.dataset.nome.includes(nome));
      const matchArea = area === '' || (card.dataset.area === area);
      const matchCoord = coord === '' || (card.dataset.coordenador === coord);

      card.style.display = (matchNome && matchArea && matchCoord) ? 'block' : 'none';
    });
  }

  nomeInput.addEventListener('input', filtrar);
  areaSelect.addEventListener('change', filtrar);
  coordSelect.addEventListener('change', filtrar);

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => {
      atualizarFiltros();
      filtrar();
    });
  } else {
    atualizarFiltros();
    filtrar();
  }
</script>
