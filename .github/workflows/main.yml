name: Sync from OneDrive

on:
  schedule:
    - cron: '*/5 * * * *'  # Roda a cada 5 minutos
  workflow_dispatch:  # Permite rodar manualmente

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Sync from OneDrive/SharePoint
        run: |
          # Baixar arquivos do SharePoint usando curl
          # Você vai precisar configurar os URLs
          echo "Sincronizando arquivos..."
          
      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-sync from OneDrive"
          git push
