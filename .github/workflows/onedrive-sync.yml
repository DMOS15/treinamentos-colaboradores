name: Sync from OneDrive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
      
      - name: Download index.html from OneDrive
        run: |
          echo "Baixando index.html..."
          # URL será adicionada depois
          
      - name: Download colaboradores folder
        run: |
          mkdir -p colaboradores
          echo "Baixando arquivos da pasta colaboradores..."
          
      - name: List downloaded files
        run: |
          echo "=== Arquivos baixados ==="
          ls -la
          echo "=== Pasta colaboradores ==="
          ls -la colaboradores/ || echo "Pasta vazia"
          
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-sync from OneDrive $(date '+%Y-%m-%d %H:%M:%S')"
          git push
